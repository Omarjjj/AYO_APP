<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
  }

  .overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 99999;
  }

  .overlay.active {
    opacity: 1;
    transition: opacity 0.4s ease-out;
  }

  .overlay.fade-out {
    opacity: 0;
    transition: opacity 1.2s ease-in;
  }

  /* ── App-Themed Edge Pulse ────────────────────────────────── */
  .edge-pulse {
    position: absolute;
    inset: 0;
    /* Base subtle inset shadow */
    box-shadow: inset 0 0 0 0 transparent;
  }

  .overlay.active .edge-pulse {
    animation: borderBreathe 2.5s ease-in-out infinite;
  }

  /* Sophisticated Purple Pulse */
  @keyframes borderBreathe {
    0%, 100% {
      box-shadow:
        inset 0 0 0 1px rgba(157, 140, 255, 0.2),
        inset 0 0 20px 2px rgba(157, 140, 255, 0.3),
        inset 0 0 60px 10px rgba(110, 60, 255, 0.1);
    }
    50% {
      box-shadow:
        inset 0 0 0 2px rgba(157, 140, 255, 0.8),       /* Sharp purple edge */
        inset 0 0 25px 5px rgba(157, 140, 255, 0.6),    /* Intense purple inner glow */
        inset 0 0 80px 20px rgba(157, 140, 255, 0.8),   /* Vibrant purple glow */
        inset 0 0 160px 40px rgba(90, 40, 255, 0.4);    /* Deep purple ambient spread */
    }
  }

  /* Optional: A very subtle vignette to frame the screen slightly */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 70%, rgba(20, 10, 40, 0.15) 100%);
  }
</style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="vignette"></div>
    <div class="edge-pulse"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')
    const overlay = document.getElementById('overlay')
    let hideTimer = null

    ipcRenderer.on('show-glow', (_event, data) => {
      const duration = (data && data.duration) || 4000

      if (hideTimer) clearTimeout(hideTimer)

      overlay.classList.remove('fade-out')
      void overlay.offsetWidth // trigger reflow
      overlay.classList.add('active')

      hideTimer = setTimeout(() => {
        overlay.classList.add('fade-out')
        overlay.classList.remove('active')
        setTimeout(() => overlay.classList.remove('fade-out'), 1200)
      }, duration)
    })

    ipcRenderer.on('hide-glow', () => {
      if (hideTimer) clearTimeout(hideTimer)
      overlay.classList.add('fade-out')
      overlay.classList.remove('active')
    })
  </script>
</body>
</html>
