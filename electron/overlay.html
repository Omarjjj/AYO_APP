<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
  }

  .overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 99999;
  }

  .overlay.active {
    opacity: 1;
    transition: opacity 0.4s ease-out;
  }

  .overlay.fade-out {
    opacity: 0;
    transition: opacity 1.2s ease-in;
  }

  /* ── Ayo theme: purple only (#9d8cff, #7c6bc4) ───────────────── */
  .edge-pulse {
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 0 transparent;
  }

  .overlay.active .edge-pulse {
    animation: borderBreathe 2.5s ease-in-out infinite;
  }

  /* Ayo purple (#9d8cff) and purple-dim (#7c6bc4) */
  @keyframes borderBreathe {
    0%, 100% {
      box-shadow:
        inset 0 0 40px 8px rgba(157, 140, 255, 0.35),
        inset 0 0 100px 20px rgba(124, 107, 196, 0.12);
    }
    50% {
      box-shadow:
        inset 0 0 70px 18px rgba(157, 140, 255, 0.6),
        inset 0 0 160px 35px rgba(124, 107, 196, 0.25);
    }
  }

  /* Vignette: same dark purple as app (--ayo-bg) */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 65%, rgba(13, 10, 20, 0.4) 100%);
  }
</style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="vignette"></div>
    <div class="edge-pulse"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')
    const overlay = document.getElementById('overlay')
    let hideTimer = null

    ipcRenderer.on('show-glow', (_event, data) => {
      const duration = (data && data.duration) || 4000

      if (hideTimer) clearTimeout(hideTimer)

      overlay.classList.remove('fade-out')
      void overlay.offsetWidth // trigger reflow
      overlay.classList.add('active')

      hideTimer = setTimeout(() => {
        overlay.classList.add('fade-out')
        overlay.classList.remove('active')
        setTimeout(() => overlay.classList.remove('fade-out'), 1200)
      }, duration)
    })

    ipcRenderer.on('hide-glow', () => {
      if (hideTimer) clearTimeout(hideTimer)
      overlay.classList.add('fade-out')
      overlay.classList.remove('active')
    })
  </script>
</body>
</html>
