<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
  }

  .overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 99999;
  }

  .overlay.active {
    opacity: 1;
    transition: opacity 0.4s ease-out;
  }

  .overlay.fade-out {
    opacity: 0;
    transition: opacity 1.2s ease-in;
  }

  /* ── App-Themed Edge Pulse ────────────────────────────────── */
  .edge-pulse {
    position: absolute;
    inset: 0;
    /* Base subtle inset shadow */
    box-shadow: inset 0 0 0 0 transparent;
  }

  .overlay.active .edge-pulse {
    animation: borderBreathe 2.5s ease-in-out infinite;
  }

  /* Using the app's purple (#9d8cff), cyan (#00f0ff), and pink (#ff64c8) */
  @keyframes borderBreathe {
    0%, 100% {
      box-shadow:
        inset 0 0 30px 5px rgba(157, 140, 255, 0.4),
        inset 0 0 80px 15px rgba(0, 240, 255, 0.1);
    }
    50% {
      box-shadow:
        inset 0 0 60px 15px rgba(157, 140, 255, 0.8),
        inset 0 0 150px 30px rgba(0, 240, 255, 0.3),
        inset 0 0 20px 2px rgba(255, 100, 200, 0.4); /* slight pink/magenta accent */
    }
  }

  /* Optional: A very subtle vignette to frame the screen slightly */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 70%, rgba(20, 10, 40, 0.15) 100%);
  }
</style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="vignette"></div>
    <div class="edge-pulse"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')
    const overlay = document.getElementById('overlay')
    let hideTimer = null

    ipcRenderer.on('show-glow', (_event, data) => {
      const duration = (data && data.duration) || 4000

      if (hideTimer) clearTimeout(hideTimer)

      overlay.classList.remove('fade-out')
      void overlay.offsetWidth // trigger reflow
      overlay.classList.add('active')

      hideTimer = setTimeout(() => {
        overlay.classList.add('fade-out')
        overlay.classList.remove('active')
        setTimeout(() => overlay.classList.remove('fade-out'), 1200)
      }, duration)
    })

    ipcRenderer.on('hide-glow', () => {
      if (hideTimer) clearTimeout(hideTimer)
      overlay.classList.add('fade-out')
      overlay.classList.remove('active')
    })
  </script>
</body>
</html>
